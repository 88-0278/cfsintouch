<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern UI Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-circles">
        <div class="circle pulse"></div>
        <div class="circle secondary"></div>
    </div>

    <div class="card">
        <h1 id="title">Hello Explorer</h1>
        <p>This is a modern Glassmorphism interface. Smooth, clean, and interactive.</p>
        <button id="btn-glow">Push the Limits</button>
        <div id="stats" class="hidden">
            <span>Clicks: <b id="count">0</b></span>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
